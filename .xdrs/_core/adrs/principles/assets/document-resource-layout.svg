<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
  <title id="title">Document resource layout</title>
  <desc id="desc">Diagram showing that each document type keeps local resources in a sibling assets folder.</desc>
  <rect width="720" height="280" fill="#f7f3ea"/>
  <rect x="24" y="24" width="672" height="232" rx="18" fill="#fffaf2" stroke="#8c7452" stroke-width="2"/>
  <text x="40" y="58" font-family="Georgia, serif" font-size="24" fill="#3d2f1f">Local resources stay beside the document</text>
  <text x="40" y="88" font-family="Menlo, monospace" font-size="15" fill="#5c4a33">subject/001-xdr.md              -&gt; subject/assets/</text>
  <text x="40" y="122" font-family="Menlo, monospace" font-size="15" fill="#5c4a33">subject/articles/001-article.md -&gt; subject/articles/assets/</text>
  <text x="40" y="156" font-family="Menlo, monospace" font-size="15" fill="#5c4a33">subject/researches/001-study.md -&gt; subject/researches/assets/</text>
  <text x="40" y="190" font-family="Menlo, monospace" font-size="15" fill="#5c4a33">skills/001-task/SKILL.md        -&gt; skills/001-task/assets/</text>
  <text x="40" y="230" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#7a6546">Package extraction remains recursive, so these folders ship with the scope automatically.</text>
</svg>